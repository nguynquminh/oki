<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/dashboard.css" />
    <link rel="stylesheet" href="assets/css/transition.css" />

    <link rel="prefetch" href="index.html" as="document" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  </head>

  <body>
    <canvas id="heartCanvas"></canvas>
    <div class="bokeh-layer">
      <div class="bokeh"></div>
      <div class="bokeh"></div>
      <div class="bokeh"></div>
      <div class="bokeh"></div>
      <div class="bokeh"></div>
    </div>

    <button class="mobile-toggle" id="mobileToggle">
      <i class="fas fa-bars"></i>
    </button>
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="#" class="sidebar-logo">
          Mimi <span class="logo-heart">♥</span>
        </a>
        <div class="sidebar-version">v2.4.1 • Admin Panel</div>
      </div>

      <div class="nav-section-label">Chính</div>
      <a href="dashboard.html" class="nav-item">
        <i class="fas fa-th-large"></i>
        <span>Tổng quan</span>
      </a>
      <a href="servers.html" class="nav-item">
        <i class="fas fa-server"></i>
        <span>Servers</span>
        <span class="nav-badge" id="stat-total-guilds">120</span>
      </a>
      <a href="commands.html" class="nav-item">
        <i class="fas fa-bolt"></i>
        <span>Lệnh Bot</span>
        <span class="nav-badge" id="stat-total-commands">48</span>
      </a>
      <a href="members.html" class="nav-item">
        <i class="fas fa-users"></i>
        <span>Thành viên</span>
      </a>

      <div class="nav-section-label">Hệ thống</div>
      <a href="stats.html" class="nav-item active">
        <i class="fas fa-chart-bar"></i>
        <span>Thống kê</span>
      </a>
      <a href="security.html" class="nav-item">
        <i class="fas fa-shield-heart"></i>
        <span>Bảo mật</span>
      </a>
      <a href="logs.html" class="nav-item">
        <i class="fas fa-clock-rotate-left"></i>
        <span>Nhật ký</span>
      </a>
      <a href="settings.html" class="nav-item">
        <i class="fas fa-cog"></i>
        <span>Cài đặt</span>
      </a>

      <div class="sidebar-footer">
        <div class="user-card">
          <div class="user-avatar">
            <img src="assets/img/avatar.jpg" alt="" />
          </div>
          <div>
            <div class="user-info-name">Mynh</div>
            <div class="user-info-role">Owner • Admin</div>
          </div>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="main-scroll" id="mainScroll">
        <div class="header-bar reveal">
          <div class="header-left">
            <h1>Thống kê</h1>
            <p>Chi tiết thống kê hoạt động.</p>
          </div>
          <div class="header-right">
            <a href="#" class="header-btn back-btn">
              <i class="fas fa-arrow-left"></i> Quay lại
            </a>
            <button class="header-btn">
              <i class="fas fa-bell"></i>
              <span class="notif-dot"></span>
            </button>
            <button class="header-btn">
              <i class="fas fa-search"></i>
            </button>
          </div>
        </div>

        <div class="metrics-row" id="placeholder-metrics"></div>

        <div class="lists-row" id="placeholder-content"></div>
        <div
          style="
            padding: 2rem;
            text-align: center;
            color: var(--charcoal-muted);
          "
        >
          Đang tải dữ liệu...
        </div>
      </div>
    </main>

    <script src="assets/js/transition.js"></script>
    <script src="assets/js/stats.js"></script>
  </body>
</html>
